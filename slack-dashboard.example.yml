# slack-dashboard example config
# Copy to ~/.config/slack-dashboard/slack-dashboard.yml and edit.
# All keys are kebab-case. ${VAR} placeholders are interpolated from the environment.

# Slack credentials. The user token reads history; the app token enables Socket Mode.
slack:
  token: ${SLACK_USER_TOKEN}
  app-token: ${SLACK_APP_TOKEN}
  # Workspace team id (T...). When set, row clicks open the native desktop app via
  # the slack:// scheme instead of a browser tab. Takes precedence over `workspace`.
  team-id: ${SLACK_TEAM_ID}

# Workspace subdomain, used to build web thread deep links when team-id is unset:
#   https://<workspace>.slack.com/archives/<channel>/p<ts>
workspace: tatari

# Channels to monitor: name -> channel id.
channels:
  sre: C0SRE0000
  data-platform: C0DATA000
  incidents: C0INC0000
  ask-security: C0SEC0000
  proj-atlas: C0ATLAS00

fetch:
  refresh-interval-minutes: 10
  # Global definition of "a thread" (a real conversation, not a lone post).
  min-replies: 3
  # Per-channel override (glob-aware, exact keys win over globs). High-stakes ops
  # channels catch two-reply threads that the global floor would drop.
  channel-min-replies:
    incidents: 1
    ask-security: 1
    sre: 1
    data-platform: 1

heat:
  reply-weight: 2
  participant-weight: 3

  # Recency: linear ramp from 1.0 down to decay-floor over decay-hours.
  decay-hours: 24
  decay-floor: 0.01

  # Dead threads age off after this many days (reversible by resurrection).
  max-thread-age-days: 3

  # Tier thresholds (drive the hot/warm/cold title color). The 🔥 glyph is NO LONGER
  # tied to the hot tier - it now means "heated exchange" (see heated-* below).
  hot-threshold: 50
  warm-threshold: 20

  # Heated-exchange signal (🔥): fires when heated-score >= heated-threshold, where
  # heated-score = structural-term + tone-term (both 0-10, summed). The structural term
  # is a deterministic render-time measure of a real back-and-forth (alternating authors,
  # few people, fast, recent); the tone term rides the per-thread summary call (the LLM
  # returns a 0-3 tone, scaled by heated-tone-weight). A strong tone alone (3 * 3.0 = 9)
  # clears the default threshold, surfacing the quietly-hostile low-volume thread that
  # heat-ranking buries. Decoupled from heat tier on purpose (a thread can be hot but
  # cordial, or low-volume but hostile).
  heated-threshold: 8.0
  heated-structural-scale: 1.0
  heated-tone-weight: 3.0

  # The single highest-leverage knob: weight the channels you care about up and
  # the noise down. Glob-aware; exact keys win over globs; default 1.0.
  channel-weights:
    sre: 2.0
    data-platform: 2.0
    incidents: 2.0
    ask-security: 2.0
    proj-*: 0.5

  # Per-person importance, keyed by Slack user id (glob-aware; default = participant-weight).
  # Raise specific people so a thread they are in floats up; the bonus is ADDITIVE into base
  # and bounded by people-weight-cap. Keep real ids/weights in a PRIVATE config, never in a
  # public repo. Example ids below are fake.
  people-weights:
    U0FAKE0001: 10   # a pinned person (e.g. your manager)
    U0FAKE0002: 8    # a teammate you always want surfaced
  # Cap the total per-thread people contribution to base (0 = no cap).
  people-weight-cap: 30

  # Velocity: boost a thread spiking now over one that accreted replies slowly.
  # The spiking glyph (⚡) fires when replies-in-window >= spiking-threshold; keeping
  # velocity-weight materially non-zero here ensures the score and the glyph agree.
  # Tune the real value in your private ~/.config file.
  velocity-weight: 5.0
  velocity-window-minutes: 30
  # Replies in the velocity window that qualify as "spiking" (matches the spiking (15+)
  # group-by tier so the glyph and grouping agree).
  spiking-threshold: 15

  # New glyph (✨): a thread is "new to your view" for this many minutes after the
  # dashboard first observes it (proxy for "since I last looked"). 60 min survives a
  # coffee-break gap without reading as stale.
  new-window-minutes: 60

  # Unanswered proxy glyph (❓): arithmetic proxy for a dropped-ball question.
  # Disabled by default; flip unanswered-enabled: true in your private ~/.config to
  # observe. The proxy fires when the first message contains "?" AND reply count is at
  # or below unanswered-max-replies AND the thread is older than unanswered-min-age-hours.
  # Effective primarily in ops channels running channel-min-replies: 1 (sre, ask-security,
  # etc.); standard channels require 3+ replies to appear so max-replies: 2 never fires.
  unanswered-enabled: false
  unanswered-max-replies: 2
  unanswered-min-age-hours: 2

  # Resurrection: a thread quiet for resurrection-gap-hours, older than
  # resurrection-age-days, that gets new activity floats back up as a zombie for
  # resurrection-display-hours.
  resurrection-gap-hours: 24
  resurrection-age-days: 2
  resurrection-display-hours: 24

  # LLM re-titling cadence.
  retitle-reply-growth: 5
  retitle-reply-percent: 25

llm:
  provider: anthropic
  model: claude-haiku-4-5-20251001
  api-key: ${ANTHROPIC_API_KEY}

server:
  host: 0.0.0.0
  port: 8080
  log-level: info

display:
  # Compact-view fold: the default pane shows the top N threads by heat ("one page
  # worth"); the rest are still server-rendered into the DOM and revealed by the global
  # show-all toggle (nothing is dropped - zero-miss disclosure). 0 disables the fold.
  compact-rows: 20
