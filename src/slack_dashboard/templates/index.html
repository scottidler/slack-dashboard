{% extends "base.html" %}
{% block content %}
<div id="conn-status"
     hx-get="/status"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML"></div>
<div class="group-controls">
    <span class="group-label-prefix">Group by:</span>
    {% for choice in ["none", "channel", "size", "velocity"] %}
    {% if not loop.first %}<span class="group-sep">|</span>{% endif %}
    <a href="#"
       class="group-choice"
       hx-get="/threads?group-by={{ choice }}"
       hx-target="#thread-list"
       hx-swap="innerHTML">{{ choice }}</a>
    {% endfor %}
</div>
<div id="thread-list"
     hx-get="/threads"
     hx-trigger="load, every 30s [document.visibilityState === 'visible'], poll"
     hx-swap="innerHTML">
    <p>Loading threads...</p>
</div>
{% endblock %}
