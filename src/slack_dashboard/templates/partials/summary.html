{% if error %}
<div class="summary-content" role="alert">
    <p>Failed to generate summary.</p>
    <button class="outline secondary"
            hx-get="/summarize/{{ channel_id }}/{{ thread_ts }}"
            hx-target="#summary-{{ channel_id }}-{{ thread_ts | replace('.', '-') }}"
            hx-swap="innerHTML">
        Retry
    </button>
</div>
{% else %}
<div class="summary-content">
    {% if quote %}
    {# The thread's first message is its real title: quote it, attributed to the author. #}
    <blockquote class="thread-quote">{{ quote }}<cite class="thread-quote-author">- {{ author }}</cite></blockquote>
    {% endif %}
    <div class="summary-bullets">{{ summary | markdown }}</div>
</div>
{% endif %}
