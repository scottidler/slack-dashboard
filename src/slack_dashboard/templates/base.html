<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slack Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        .heat-hot { color: #e74c3c; }
        .heat-warm { color: #f39c12; }
        .heat-cold { color: #3498db; }
        .channel-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            background: var(--pico-muted-border-color);
        }
        .started-by {
            font-size: 0.8em;
            color: var(--pico-muted-color);
            margin-left: 0.3em;
        }
        .summary-content { margin-top: 0.25em; padding: 0.5em; background: var(--pico-card-sectioning-background-color); border-radius: 4px; font-size: 0.9em; }
        .banner { padding: 0.5em 0.75em; border-radius: 4px; margin-bottom: 0.75em; font-size: 0.9em; font-weight: bold; }
        .banner-error { background: #e74c3c; color: #fff; }
        .banner-warn { background: #f39c12; color: #1a1a1a; }
        /* Compact rows: one line per thread, density over filtering. */
        .group-controls { font-size: 0.85em; margin-bottom: 0.75em; }
        .group-label-prefix { color: var(--pico-muted-color); margin-right: 0.5em; }
        .group-choice { margin-right: 0.75em; }
        .thread-group { margin-bottom: 1em; }
        .group-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; color: var(--pico-muted-color); margin: 0.5em 0 0.25em; border-bottom: 1px solid var(--pico-muted-border-color); }
        .thread-row { display: flex; align-items: baseline; gap: 0.5em; padding: 0.15em 0; line-height: 1.4; flex-wrap: wrap; }
        .thread-row:hover { background: var(--pico-card-sectioning-background-color); }
        .dismiss-btn { flex: 0 0 auto; background: none; border: none; color: var(--pico-muted-color); cursor: pointer; padding: 0 0.25em; width: auto; margin: 0; font-size: 0.85em; }
        .dismiss-btn:hover { color: #e74c3c; }
        .row-link { flex: 1 1 auto; min-width: 0; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .row-title { margin-left: 0.4em; }
        .row-counts { flex: 0 0 auto; font-size: 0.8em; color: var(--pico-muted-color); white-space: nowrap; }
        .row-emoji { flex: 0 0 auto; }
        .row-summary { display: none; flex: 1 1 100%; }
        .thread-row:hover .row-summary { display: block; }
        .summary-hint { font-size: 0.8em; color: var(--pico-muted-color); font-style: italic; }
    </style>
</head>
<body>
    <main class="container">
        <h1>Slack Dashboard</h1>
        {% block content %}{% endblock %}
    </main>
    <script>
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                htmx.trigger(document.getElementById('thread-list'), 'poll');
            }
        });
    </script>
</body>
</html>
